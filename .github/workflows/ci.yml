name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test (race detector)
        run: go test -race -count=1 ./...

  build-cli:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-X main.GitCommit=$(git describe --tags --always --dirty)" \
            -o tonutils-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/proxy-cli/

      - uses: actions/upload-artifact@v4
        with:
          name: tonutils-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tonutils-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  build-android:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goarch: arm64
            ndk_abi: aarch64
            ndk_triple: aarch64-linux-android21
            android_abi: arm64-v8a
          - goarch: arm
            ndk_abi: armv7a
            ndk_triple: armv7a-linux-androideabi21
            android_abi: armeabi-v7a
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27b

      - name: Build android/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_triple }}-clang
        run: |
          go build -buildmode=c-shared \
            -ldflags "-X main.GitCommit=$(git describe --tags --always --dirty)" \
            -o libtonproxy-${{ matrix.android_abi }}.so \
            ./cmd/lib/

      - uses: actions/upload-artifact@v4
        with:
          name: libtonproxy-${{ matrix.android_abi }}
          path: libtonproxy-${{ matrix.android_abi }}.so

  release:
    runs-on: ubuntu-latest
    needs: [build-cli, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
