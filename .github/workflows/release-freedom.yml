name: Release freedom binaries

on:
  push:
    tags:
      - "v*-freedom"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: tonutils-freedom-cli-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: tonutils-freedom-cli-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: tonutils-freedom-cli-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: tonutils-freedom-cli-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: tonutils-freedom-cli-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.GitCommit=$(git describe --tags --always --dirty)" \
            -o ${{ matrix.artifact }} \
            ./cmd/proxy-cli/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
